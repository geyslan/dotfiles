# general
backend = "glx";
vsync = "opengl-mswc";
unredir-if-possible = false;
paint-on-overlay = true;

# shadows
no-dock-shadow = true;
no-dnd-shadow = true;
clear-shadow = true;
shadow-opacity = 0;
shadow-exclude = [
	"name = 'Notification'",
	"class_g = 'Conky'",
	"class_g ?= 'Notify-osd'",
	"_GTK_FRAME_EXTENTS@:c"
];

# fading
fading = true;
fade-delta = 2;
